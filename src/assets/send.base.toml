# ── Existing send infrastructure ────────────────────────────────────────

[sinks.debug]
enabled = true
type = "debug"

[sinks.http]
enabled = false
type = "http"
destination = "http://localhost:8080/webhook/000"
total_duration_of_retries = "30s"

[sources.cli]
enabled = true

[sources.cli.extractor]
type = "cli"

# ── Built-in run types (all disabled; --run <name> enables one) ──────────
[sources.testsuiterun_junit]
enabled = false
transformer_refs = [
  "ci_env_detection",
  "to_testsuiterun_junit",
  "testoutput_from_testsuiterun",
  "ci_links"
]

[sources.testsuiterun_junit.extractor]
type = "subprocess"
data_globs = ["**/TEST-*.xml", "**/*.xml"]
parser = "xml"

[sources.testsuiterun_tap]
enabled = false
transformer_refs = [
  "ci_env_detection",
  "to_testsuiterun_tap",
  "testoutput_from_testsuiterun",
  "ci_links"
]

[sources.testsuiterun_tap.extractor]
type = "subprocess"
data_globs = ["**/*.tap"]
parser = "tap"

[sources.testsuiterun_sarif]
enabled = false
transformer_refs = [
  "ci_env_detection",
  "to_testsuiterun_sarif",
  "testoutput_from_testsuiterun",
  "ci_links"
]

[sources.testsuiterun_sarif.extractor]
type = "subprocess"
data_globs = ["**/*.sarif", "**/*.sarif.json"]
parser = "json"

[sources.taskrun]
enabled = false
transformer_refs = ["ci_env_detection", "to_taskrun", "ci_links"]

[sources.taskrun.extractor]
type = "subprocess"
no_data = true

# ── CDEvent builders (named so custom configs can reference or override) ──

[transformers.to_testsuiterun_junit]
type = "vrl"
template = '''
# Converts subprocess EventSource to testSuiteRun CDEvent (JUnit XML variant)
# At this point .metadata.run.* is populated by ci_env_detection

suite_name = string(.metadata.run.suite_name) ?? "unknown"
subject_id = string(.metadata.run.subject_id) ?? "unknown"
source_url = string(.metadata.context.source) ?? "cdviz-collector://local"
env_id     = string(.metadata.run.env_id) ?? "/local"
started_at = string(.metadata.run.started_at) ?? ""

if .metadata.run.status == "started" {
  .body = {
    "context": { "specversion": "0.5.0", "id": "0", "source": source_url,
      "type": "dev.cdevents.testsuiterun.started.0.3.0", "timestamp": started_at },
    "subject": { "id": subject_id,
      "content": { "trigger": {"type": "schedule"},
        "environment": {"id": env_id},
        "testSuite": {"id": suite_name, "version": ""} } }
  }
} else {
  # Aggregate from array of XML-parsed JUnit files in .body
  total_tests = 0; total_failed = 0; total_errors = 0; total_skipped = 0; total_time = 0.0
  if is_array(.body) {
    for_each(array!(.body)) -> |_i, file| {
      suite = object(get(file, ["testsuite"]) ?? {}) ?? {}
      total_tests   = total_tests   + (to_int(get(suite, ["@tests"])    ?? "0") ?? 0)
      total_failed  = total_failed  + (to_int(get(suite, ["@failures"]) ?? "0") ?? 0)
      total_errors  = total_errors  + (to_int(get(suite, ["@errors"])   ?? "0") ?? 0)
      total_skipped = total_skipped + (to_int(get(suite, ["@skipped"])  ?? "0") ?? 0)
      total_time    = total_time    + (to_float(get(suite, ["@time"])   ?? "0") ?? 0.0)
    }
  }
  exit_code = to_int(.metadata.run.exit_code) ?? 0
  outcome   = if total_failed + total_errors > 0 { "failure" } else if exit_code != 0 { "failure" } else { "success" }
  passed    = total_tests - total_failed - total_errors - total_skipped

  .body = {
    "context": { "specversion": "0.5.0", "id": "0", "source": source_url,
      "type": "dev.cdevents.testsuiterun.finished.0.3.0", "timestamp": started_at },
    "subject": { "id": subject_id,
      "content": { "outcome": outcome, "reason": "",
        "environment": {"id": env_id},
        "testSuite": {"id": suite_name, "version": ""} } },
    "customData": { "tests_count": total_tests, "passed": passed,
      "failed": total_failed, "skipped": total_skipped, "errored": total_errors,
      "duration_ms": to_int(total_time * 1000), "exit_code": exit_code }
  }
}
[.]
'''

[transformers.to_testsuiterun_tap]
type = "vrl"
template = '''
# Converts subprocess EventSource to testSuiteRun CDEvent (TAP variant)
# At this point .metadata.run.* is populated by ci_env_detection

suite_name = string(.metadata.run.suite_name) ?? "unknown"
subject_id = string(.metadata.run.subject_id) ?? "unknown"
source_url = string(.metadata.context.source) ?? "cdviz-collector://local"
env_id     = string(.metadata.run.env_id) ?? "/local"
started_at = string(.metadata.run.started_at) ?? ""

if .metadata.run.status == "started" {
  .body = {
    "context": { "specversion": "0.5.0", "id": "0", "source": source_url,
      "type": "dev.cdevents.testsuiterun.started.0.3.0", "timestamp": started_at },
    "subject": { "id": subject_id,
      "content": { "trigger": {"type": "schedule"},
        "environment": {"id": env_id},
        "testSuite": {"id": suite_name, "version": ""} } }
  }
} else {
  total_tests = 0; total_failed = 0
  if is_array(.body) {
    for_each(array!(.body)) -> |_i, result| {
      tests = array(get(result, ["tests"]) ?? []) ?? []
      total_tests = total_tests + length(tests)
      for_each(tests) -> |_j, t| {
        status = string(get(t, ["status"]) ?? "ok") ?? "ok"
        if status == "not_ok" { total_failed = total_failed + 1 }
      }
    }
  }
  exit_code = to_int(.metadata.run.exit_code) ?? 0
  outcome   = if total_failed > 0 { "failure" } else if exit_code != 0 { "failure" } else { "success" }
  passed    = total_tests - total_failed

  .body = {
    "context": { "specversion": "0.5.0", "id": "0", "source": source_url,
      "type": "dev.cdevents.testsuiterun.finished.0.3.0", "timestamp": started_at },
    "subject": { "id": subject_id,
      "content": { "outcome": outcome, "reason": "",
        "environment": {"id": env_id},
        "testSuite": {"id": suite_name, "version": ""} } },
    "customData": { "tests_count": total_tests, "passed": passed,
      "failed": total_failed, "exit_code": exit_code }
  }
}
[.]
'''

[transformers.to_testsuiterun_sarif]
type = "vrl"
template = '''
# Converts subprocess EventSource to testSuiteRun CDEvent (SARIF JSON variant)
# At this point .metadata.run.* is populated by ci_env_detection

suite_name = string(.metadata.run.suite_name) ?? "unknown"
subject_id = string(.metadata.run.subject_id) ?? "unknown"
source_url = string(.metadata.context.source) ?? "cdviz-collector://local"
env_id     = string(.metadata.run.env_id) ?? "/local"
started_at = string(.metadata.run.started_at) ?? ""

if .metadata.run.status == "started" {
  .body = {
    "context": { "specversion": "0.5.0", "id": "0", "source": source_url,
      "type": "dev.cdevents.testsuiterun.started.0.3.0", "timestamp": started_at },
    "subject": { "id": subject_id,
      "content": { "trigger": {"type": "schedule"},
        "environment": {"id": env_id},
        "testSuite": {"id": suite_name, "version": ""} } }
  }
} else {
  # Extract tool name/version from first run of first SARIF file
  tool_name = suite_name; tool_version = ""
  if is_array(.body) && length(array!(.body)) > 0 {
    first_doc = object(array!(.body)[0]) ?? {}
    first_runs = array(get(first_doc, ["runs"]) ?? []) ?? []
    if length(first_runs) > 0 {
      driver = object(get(first_runs[0], ["tool", "driver"]) ?? {}) ?? {}
      d_name = string(get(driver, ["name"]) ?? "") ?? ""
      if d_name != "" {
        tool_name    = d_name
        tool_version = string(get(driver, ["version"]) ?? "") ?? ""
      }
    }
  }

  # Aggregate results across all SARIF files and runs
  total_results = 0; total_errors = 0; total_warnings = 0; total_notes = 0
  if is_array(.body) {
    for_each(array!(.body)) -> |_i, doc| {
      runs = array(get(doc, ["runs"]) ?? []) ?? []
      for_each(runs) -> |_j, run| {
        results = array(get(run, ["results"]) ?? []) ?? []
        total_results = total_results + length(results)
        for_each(results) -> |_k, result| {
          level = string(get(result, ["level"]) ?? "warning") ?? "warning"
          if level == "error" {
            total_errors   = total_errors   + 1
          } else if level == "warning" {
            total_warnings = total_warnings + 1
          } else if level == "note" {
            total_notes    = total_notes    + 1
          }
        }
      }
    }
  }

  exit_code = to_int(.metadata.run.exit_code) ?? 0
  outcome   = if total_errors > 0 { "failure" } else if exit_code != 0 { "failure" } else { "success" }

  .body = {
    "context": { "specversion": "0.5.0", "id": "0", "source": source_url,
      "type": "dev.cdevents.testsuiterun.finished.0.3.0", "timestamp": started_at },
    "subject": { "id": subject_id,
      "content": { "outcome": outcome, "reason": "",
        "environment": {"id": env_id},
        "testSuite": {"id": suite_name, "version": ""} } },
    "customData": {
      "sarif": { "summary": {
        "results_count": total_results,
        "errors": total_errors,
        "warnings": total_warnings,
        "notes": total_notes,
        "tool": tool_name,
        "tool_version": tool_version
      }},
      "exit_code": exit_code
    }
  }
}
[.]
'''

[transformers.to_taskrun]
type = "vrl"
template = '''
# Converts subprocess EventSource to taskRun CDEvent (exit-code only)
# At this point .metadata.run.* is populated by ci_env_detection

task_name = string(.metadata.run.task_name) ?? "unknown"
subject_id = string(.metadata.run.subject_id) ?? "unknown"
source_url = string(.metadata.context.source) ?? "cdviz-collector://local"
started_at = string(.metadata.run.started_at) ?? ""

if .metadata.run.status == "started" {
  .body = {
    "context": { "specversion": "0.5.0", "id": "0", "source": source_url,
      "type": "dev.cdevents.taskrun.started.0.3.0", "timestamp": started_at },
    "subject": { "id": subject_id,
      "content": { "taskName": task_name } }
  }
} else {
  exit_code = to_int(.metadata.run.exit_code) ?? 0
  outcome   = if exit_code != 0 { "failure" } else { "success" }
  .body = {
    "context": { "specversion": "0.5.0", "id": "0", "source": source_url,
      "type": "dev.cdevents.taskrun.finished.0.3.0", "timestamp": started_at },
    "subject": { "id": subject_id,
      "content": { "outcome": outcome, "taskName": task_name } }
  }
}
[.]
'''

# ── Shared transformer: testoutput.published emission ────────────────────
# Runs AFTER ci_links; emits a testoutput.published event alongside the
# testsuiterun.finished event when .metadata.run.results_url is set.
# Returns [testsuiterun_event, testoutput_event] when results_url is present,
# or [testsuiterun_event] otherwise.
[transformers.testoutput_from_testsuiterun]
type = "vrl"
template = '''
results_url = string(.metadata.run.results_url) ?? ""
event_type  = string(.body.context.type) ?? ""

if event_type == "dev.cdevents.testsuiterun.finished.0.3.0" && results_url != "" {
  source_url = string(.metadata.context.source) ?? "cdviz-collector://local"
  started_at = string(.metadata.run.started_at) ?? ""

  testoutput_event = .
  testoutput_event.body = {
    "context": { "specversion": "0.5.0", "id": "0", "source": source_url,
      "type": "dev.cdevents.testoutput.published.0.3.0", "timestamp": started_at },
    "subject": { "id": results_url,
      "content": { "outputType": "report", "format": "text/html", "uri": results_url } }
  }
  [., testoutput_event]
} else {
  [.]
}
'''

# ── Shared transformer: cross-reference links ─────────────────────────────
# Runs AFTER the CDEvent body is built; reads .metadata.run.* link keys
# set via --metadata overrides and injects them into the emitted CDEvent.
#
# Currently writes to customData.links (CDEvents ≤ 0.5 workaround).
# When CDEvents 0.6+ makes context.links stable for subject references,
# update this single transformer to write to .body.context.links instead.
#
# Referenced by testsuiterun_* sources. Custom configs can also add
# "ci_links" to any transformer_refs list, or to pipeline.transformer_refs.
#
# Supported --metadata keys:
#   tested_artifact_id   → testedAgainst artifact  (e.g. pkg:oci/my-app@sha256:...)
#   tested_env_id        → testedAgainst environment (e.g. /cluster/staging)
#   tested_repo_id       → testedAgainst repository  (e.g. https://github.com/org/repo)
#   results_url          → storedAt repository        (e.g. https://ci.example.com/results/42)
[transformers.ci_links]
type = "vrl"
template = '''
links = []

artifact_id = string(.metadata.run.tested_artifact_id) ?? ""
if artifact_id != "" {
  links = push(links, {
    "linkKind": "testedAgainst",
    "target": { "subject": { "type": "artifact", "id": artifact_id } }
  })
}

env_id = string(.metadata.run.tested_env_id) ?? ""
if env_id != "" {
  links = push(links, {
    "linkKind": "testedAgainst",
    "target": { "subject": { "type": "environment", "id": env_id } }
  })
}

repo_id = string(.metadata.run.tested_repo_id) ?? ""
if repo_id != "" {
  links = push(links, {
    "linkKind": "testedAgainst",
    "target": { "subject": { "type": "repository", "id": repo_id } }
  })
}

results_url = string(.metadata.run.results_url) ?? ""
if results_url != "" {
  links = push(links, {
    "linkKind": "storedAt",
    "target": { "subject": { "type": "testoutput", "id": results_url } }
  })
}

if length(links) > 0 {
  .body.customData.links = append(array(.body.customData.links) ?? [], links)
}
[.]
'''

# ── Shared transformer: CI environment detection ─────────────────────────
# Reads CI env vars via VRL get_env_var(); enriches .metadata.run.*
# Referenced by all run types via transformer_refs = ["ci_env_detection", ...]
[transformers.ci_env_detection]
type = "vrl"
template = '''
# Detect CI system and populate .metadata.run.* using environment variables
# VRL get_env_var(name) returns Ok(value) or Err if unset.

github_actions = get_env_var("GITHUB_ACTIONS") ?? ""
gitlab_ci      = get_env_var("GITLAB_CI") ?? ""
jenkins_url    = get_env_var("JENKINS_URL") ?? ""

if github_actions == "true" {
  repo      = get_env_var("GITHUB_REPOSITORY") ?? ""
  run_id    = join!([get_env_var("GITHUB_RUN_ID") ?? "0", get_env_var("GITHUB_RUN_ATTEMPT") ?? "1"], "/")
  job_name  = get_env_var("GITHUB_JOB") ?? "unknown"
  workflow  = get_env_var("GITHUB_WORKFLOW") ?? ""
  ref_name  = get_env_var("GITHUB_REF_NAME") ?? ""

  .metadata.run.ci_system   = "github"
  .metadata.run.ci_repo     = repo
  .metadata.run.ci_run_id   = run_id
  .metadata.run.ci_job_name = job_name
  .metadata.run.ci_workflow = workflow
  .metadata.run.suite_name  = string(.metadata.run.suite_name) ?? job_name
  .metadata.run.task_name   = string(.metadata.run.task_name) ?? job_name
  .metadata.run.env_id      = "/ci/" + ref_name
  .metadata.run.subject_id  = "https://github.com/" + repo + "/actions/runs/" + run_id + "/" + job_name

} else if gitlab_ci == "true" {
  repo      = get_env_var("CI_PROJECT_PATH") ?? ""
  run_id    = get_env_var("CI_PIPELINE_ID") ?? "0"
  job_name  = get_env_var("CI_JOB_NAME") ?? "unknown"
  ref_name  = get_env_var("CI_COMMIT_REF_NAME") ?? ""

  .metadata.run.ci_system   = "gitlab"
  .metadata.run.ci_repo     = repo
  .metadata.run.ci_run_id   = run_id
  .metadata.run.ci_job_name = job_name
  .metadata.run.suite_name  = string(.metadata.run.suite_name) ?? job_name
  .metadata.run.task_name   = string(.metadata.run.task_name) ?? job_name
  .metadata.run.env_id      = "/ci/" + ref_name
  .metadata.run.subject_id  = "https://gitlab.com/" + repo + "/-/pipelines/" + run_id + "/" + job_name

} else if jenkins_url != "" {
  job_name = get_env_var("JOB_BASE_NAME") ?? "unknown"
  run_id   = get_env_var("BUILD_NUMBER") ?? "0"
  job_full = get_env_var("JOB_NAME") ?? job_name

  .metadata.run.ci_system   = "jenkins"
  .metadata.run.ci_repo     = job_full
  .metadata.run.ci_run_id   = run_id
  .metadata.run.ci_job_name = job_name
  .metadata.run.suite_name  = string(.metadata.run.suite_name) ?? job_name
  .metadata.run.task_name   = string(.metadata.run.task_name) ?? job_name
  .metadata.run.env_id      = "/ci"
  .metadata.run.subject_id  = jenkins_url + "job/" + job_full + "/" + run_id + "/" + job_name

} else {
  # Generic local fallback
  suite = string(.metadata.run.suite_name) ?? "run"
  .metadata.run.ci_system   = "local"
  .metadata.run.ci_repo     = ""
  .metadata.run.ci_job_name = ""
  .metadata.run.env_id      = "/local"
  .metadata.run.subject_id  = "cdviz-collector://local/" + suite
}

# Apply user --metadata overrides (injected as metadata.run.overrides by subprocess extractor)
overrides = object(.metadata.run.overrides) ?? {}
for_each(overrides) -> |k, v| {
  .metadata.run = set!(.metadata.run, [k], v)
}

[.]
'''
